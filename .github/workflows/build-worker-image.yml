name: build-worker-image

# 在 GitHub 云端构建 worker 镜像并推到 GHCR（家里不用装 docker）。
# 触发：改了 Docker 相关文件自动构建；也可在 Actions 页手动 Run。
on:
  workflow_dispatch:
  push:
    branches: [claude/music-video-production-4RCPK]
    paths:
      - Dockerfile
      - docker/**
      - requirements.txt
      - cloud_worker.py
      - generate_infinitetalk.py
      - wan/**
      - src/**
      - kokoro/**
      - .github/workflows/build-worker-image.yml

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # 镜像 ~20G，免费 runner 默认盘不够 → 清出 ~30G
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune --all --force || true
          df -h

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # latest 会被各云主机的本地缓存坑（同 tag 不重拉 → 跑旧代码）。
          # 每次构建多打一个唯一 tag（build-<run_number>），模板钉死它即可强制拉新。
          tags: |
            ghcr.io/kocherzhou/infinitetalk-worker:latest
            ghcr.io/kocherzhou/infinitetalk-worker:build-${{ github.run_number }}
