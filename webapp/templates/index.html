<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>数字人 MTV 工作台</title>
  <style>
    :root {
      --bg:#0d0d0d; --surface:#161616; --surface2:#1e1e1e; --surface3:#252525;
      --border:#2a2a2a; --border2:#333; --text:#e2e2e2; --muted:#777;
      --accent:#38bdf8; --accent-dk:#0284c7; --success:#4ade80; --error:#f87171;
      --warn-bg:#1a1200; --warn-bd:#4d3800; --warn-txt:#fbbf24;
    }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text);
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans CJK SC",sans-serif;
      line-height:1.5; }
    .wrap { max-width:760px; margin:0 auto; padding:28px 20px 60px; }
    header { display:flex; align-items:center; gap:12px; margin-bottom:6px; }
    .header-logo { font-size:26px; }
    .header-title { font-size:20px; font-weight:700; color:#fff; letter-spacing:-.3px; }
    .header-sub { font-size:12px; color:var(--muted); margin-top:2px; }

    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:18px; }
    @media (max-width:560px){ .grid2 { grid-template-columns:1fr; } }

    .drop {
      background:var(--surface); border:2px dashed var(--border2); border-radius:16px;
      padding:30px 18px; text-align:center; cursor:pointer; transition:border-color .2s, background .2s;
    }
    .drop:hover, .drop.dragging { border-color:var(--accent); background:#071621; }
    .drop.filled { border-style:solid; border-color:var(--accent-dk); }
    .drop-icon { font-size:38px; line-height:1; margin-bottom:10px; }
    .drop-title { font-size:15px; font-weight:600; color:#fff; }
    .drop-hint { font-size:12px; color:var(--muted); margin-top:5px; word-break:break-all; }
    .drop img.preview { max-width:100%; max-height:150px; border-radius:10px; margin-top:6px; }
    .drop audio { width:100%; margin-top:8px; }

    .field { margin-top:16px; }
    .field label { display:block; font-size:13px; color:var(--muted); margin-bottom:6px; }
    textarea {
      width:100%; min-height:72px; resize:vertical; padding:11px 12px; background:var(--surface2);
      border:1px solid var(--border2); color:var(--text); border-radius:9px; font-size:13.5px;
      font-family:inherit; outline:none;
    }
    textarea:focus { border-color:var(--accent); }

    .go {
      width:100%; margin-top:18px; padding:14px; border:0; border-radius:11px; cursor:pointer;
      background:linear-gradient(90deg,var(--accent-dk),var(--accent)); color:#06283a;
      font-size:15px; font-weight:700; transition:opacity .2s;
    }
    .go:disabled { opacity:.5; cursor:not-allowed; }

    /* progress card */
    #progressCard { display:none; margin-top:24px; background:var(--surface); border:1px solid var(--border);
      border-radius:16px; padding:22px; }
    .steps { display:flex; justify-content:space-between; position:relative; margin:4px 0 22px; }
    .steps::before { content:""; position:absolute; top:15px; left:8%; right:8%; height:2px; background:var(--border2); }
    .step { position:relative; z-index:1; text-align:center; flex:1; }
    .step-dot { width:32px; height:32px; border-radius:50%; background:var(--surface3); border:2px solid var(--border2);
      display:flex; align-items:center; justify-content:center; margin:0 auto 6px; font-size:14px; color:var(--muted);
      transition:all .3s; }
    .step.active .step-dot { border-color:var(--accent); color:var(--accent); box-shadow:0 0 0 4px #071621; }
    .step.done .step-dot { background:var(--accent-dk); border-color:var(--accent-dk); color:#fff; }
    .step-label { font-size:11px; color:var(--muted); }
    .step.active .step-label, .step.done .step-label { color:var(--text); }

    .bar-track { height:8px; background:var(--surface3); border-radius:5px; overflow:hidden; }
    .bar-fill { height:100%; width:0; border-radius:5px; background:linear-gradient(90deg,var(--accent-dk),var(--accent)); transition:width .4s; }
    .progress-msg { margin-top:10px; font-size:13px; color:var(--muted); }
    .progress-msg.error { color:var(--error); }

    #logBox { margin-top:16px; background:#0a0a0a; border:1px solid var(--border); border-radius:10px; overflow:hidden; }
    .log-box-title { font-size:11px; color:var(--muted); padding:7px 12px; border-bottom:1px solid var(--border); }
    #logEntries { max-height:140px; overflow-y:auto; padding:4px 0; font-size:12px;
      font-family:ui-monospace,Menlo,Consolas,monospace; }
    .log-entry { display:flex; gap:10px; padding:3px 12px; line-height:1.45; }
    .log-time { color:#3a5a70; white-space:nowrap; flex-shrink:0; }
    .log-msg { color:#7a9fb5; }
    .log-entry.log-success .log-msg { color:var(--success); }
    .log-entry.log-error .log-msg { color:var(--error); }

    #resultCard { display:none; margin-top:20px; text-align:center; }
    #resultCard video { width:100%; border-radius:12px; background:#000; }
    .dl-row { display:flex; gap:10px; margin-top:12px; }
    .dl-btn { flex:1; padding:11px; border-radius:9px; border:1px solid var(--border2); background:var(--surface2);
      color:var(--text); font-size:13px; cursor:pointer; text-decoration:none; }
    .dl-btn.primary { background:var(--accent-dk); color:#fff; border-color:var(--accent-dk); }

    .note { font-size:11.5px; color:var(--muted); margin-top:8px; }

    /* 云机在线/失联状态条 */
    .fleet { margin-top:10px; font-size:12.5px; padding:7px 11px; border-radius:9px;
      background:var(--surface); border:1px solid var(--border); color:var(--muted); }
    .fleet.on  { color:var(--success); border-color:#14532d; background:#08160c; }
    .fleet.off { color:var(--warn-txt); border-color:var(--warn-bd); background:var(--warn-bg); }
    /* 人声活动检测预警条（前奏/间奏注入提示） */
    .vad-box { display:none; margin-top:12px; padding:9px 12px; border-radius:9px;
      background:var(--warn-bg); border:1px solid var(--warn-bd); color:var(--warn-txt);
      font-size:12.5px; line-height:1.65; }
    .vad-box .vt { font-weight:600; margin-bottom:3px; }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="header-logo">🎤</div>
    <div>
      <div class="header-title">数字人 MTV 工作台</div>
      <div class="header-sub">立绘 + 音频 → 对口型视频 · 云端 GPU 生成</div>
    </div>
  </header>

  <div id="fleetBar" class="fleet" title="云端 GPU worker 轮询状态">☁ 云机状态检测中…</div>

  <!-- inputs -->
  <div id="inputArea">
    <div class="grid2">
      <div class="drop" id="dropImage" tabindex="0">
        <div class="drop-body" id="imgBody">
          <div class="drop-icon">🖼️</div>
          <div class="drop-title">立绘 / 人像图片</div>
          <div class="drop-hint">点击或拖入 PNG / JPG · <strong>可多选=多机位</strong></div>
        </div>
        <input type="file" id="fileImage" accept="image/*" multiple hidden>
      </div>
      <div class="drop" id="dropAudio" tabindex="0">
        <div class="drop-body" id="audBody">
          <div class="drop-icon">🎵</div>
          <div class="drop-title">音频（说话 / 唱）</div>
          <div class="drop-hint">点击或拖入 WAV / MP3</div>
        </div>
        <input type="file" id="fileAudio" accept="audio/*" hidden>
      </div>
    </div>

    <div class="field">
      <label>场景提示词（英文，可留空用默认；建议描述人物/镜头/光线）</label>
      <textarea id="prompt" placeholder="A woman sings passionately into a microphone, close-up, warm studio lighting..."></textarea>
    </div>

    <div class="field" id="perPromptField" style="display:none">
      <label>分镜提示词（逐张生效，自动在末尾拼接上面的全局基底；留空=只用全局）
        <button type="button" id="autoArcBtn" style="margin-left:8px;font-size:12px;padding:3px 11px;border-radius:6px;border:1px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer">✨ 一键铺情绪曲线</button>
        <button type="button" id="advisorBtn" style="margin-left:6px;font-size:12px;padding:3px 11px;border-radius:6px;border:1px solid #a78bfa;background:transparent;color:#a78bfa;cursor:pointer">🧠 军师参谋（本地排序+运镜）</button>
        <button type="button" id="planBtn" style="margin-left:6px;font-size:12px;padding:3px 11px;border-radius:6px;border:1px solid #34d399;background:transparent;color:#34d399;cursor:pointer">🎬 结构分镜排期（按音乐结构切镜+派云机）</button>
      </label>
      <div id="advisorPanel" style="display:none;margin:6px 0 10px;padding:10px 12px;border:1px solid #a78bfa55;background:#a78bfa10;border-radius:10px;font-size:12.5px;line-height:1.6"></div>
      <div id="planPanel" style="display:none;margin:6px 0 10px;padding:10px 12px;border:1px solid #34d39955;background:#34d39910;border-radius:10px;font-size:12.5px;line-height:1.6"></div>
      <div id="perPromptList"></div>
    </div>

    <button class="go" id="goBtn" disabled>🎬 开始生成对口型视频</button>
    <div class="note" id="goNote">提交后任务进入队列；请开启云端 GPU（AutoDL），worker 会自动接单生成。<br>💡 想要"按音乐结构切镜 + 自己调分镜"的好效果，用上面绿色的 <b>🎬 结构分镜排期</b>，调好后点它面板里的 <b>🚀 提交云机渲染</b>（不是本按钮）。</div>
  </div>

  <!-- progress -->
  <div id="progressCard">
    <div class="steps">
      <div class="step" id="s-up"><div class="step-dot">⬆</div><div class="step-label">上传</div></div>
      <div class="step" id="s-queue"><div class="step-dot">⏳</div><div class="step-label">排队</div></div>
      <div class="step" id="s-gen"><div class="step-dot">🪄</div><div class="step-label">云端生成</div></div>
      <div class="step" id="s-done"><div class="step-dot">✓</div><div class="step-label">完成</div></div>
    </div>
    <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
    <div class="progress-msg" id="progressMsg">准备中…</div>
    <div id="vadBox" class="vad-box"></div>
    <div id="logBox">
      <div class="log-box-title">▶ 实时日志</div>
      <div id="logEntries"></div>
    </div>
  </div>

  <!-- result -->
  <div id="resultCard">
    <video id="resultVideo" controls></video>
    <div class="dl-row">
      <a class="dl-btn primary" id="dlBtn" download>⬇ 下载 MP4</a>
      <button class="dl-btn" id="newBtn">↺ 再做一个</button>
    </div>
  </div>
</div>

<script>
  let imgFiles = [], imgPrompts = [], imgStatic = [], imgMotion = [], audFile = null, evt = null, curJob = null;

  function bindDrop(dropEl, inputEl, accept, onPick) {
    dropEl.addEventListener('click', () => inputEl.click());
    dropEl.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') inputEl.click(); });
    inputEl.addEventListener('change', () => { if (inputEl.files[0]) onPick(inputEl.files[0]); });
    ['dragover','dragenter'].forEach(ev => dropEl.addEventListener(ev, e => { e.preventDefault(); dropEl.classList.add('dragging'); }));
    ['dragleave','drop'].forEach(ev => dropEl.addEventListener(ev, e => { e.preventDefault(); dropEl.classList.remove('dragging'); }));
    dropEl.addEventListener('drop', e => { const f = e.dataTransfer.files[0]; if (f) onPick(f); });
  }

  // 图片区：支持多选（多机位）。每次选/拖会"追加"，方便分多次挑图。
  function addImages(fileList) {
    for (const f of fileList) if (f && f.type.startsWith('image/')) { imgFiles.push(f); imgPrompts.push(''); imgStatic.push(false); imgMotion.push(''); }
    renderImages();
    renderPerPrompts();
    refreshGo();
  }
  // 调整画面顺序：与相邻图交换。四个并行数组一起换，保住已填分镜词/🛰️勾选；
  // imgHashes 顺序也变了 → 清空让剪接预判按新序重算。
  function moveImg(i, dir) {
    const j = i + dir;
    if (j < 0 || j >= imgFiles.length) return;
    [imgFiles, imgPrompts, imgStatic, imgMotion].forEach(a => { const t = a[i]; a[i] = a[j]; a[j] = t; });
    imgHashes = [];
    renderImages();
    renderPerPrompts();
    refreshGo();
  }
  function renderImages() {
    if (!imgFiles.length) return;
    const thumbs = imgFiles.map((f, i) =>
      `<div style="position:relative;display:inline-block;margin:3px">
         <img class="preview" style="max-height:84px" src="${URL.createObjectURL(f)}">
         <span style="position:absolute;top:2px;left:2px;background:#000a;color:#fff;border-radius:4px;padding:0 5px;font-size:11px">${i + 1}</span>
       </div>`).join('');
    const tip = imgFiles.length === 1
      ? '1 张 = 单机位整段' : `${imgFiles.length} 张 = 多机位（按序切歌拼接）`;
    document.getElementById('imgBody').innerHTML =
      `<div class="drop-title">🖼️ ${tip}</div><div>${thumbs}</div>
       <div class="drop-hint">再点可继续追加；清空请刷新页面</div>`;
    document.getElementById('dropImage').classList.add('filled');
  }

  // ── 剪接预判：相邻图 dHash 感知差异 → 跳戏风险预警（30 度规则的廉价代理） ──
  let imgHashes = [];   // 与 imgFiles 同序的 64bit dHash（字符串）
  function fileDHash(file) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const c = document.createElement('canvas'); c.width = 9; c.height = 8;
        const ctx = c.getContext('2d');
        ctx.drawImage(img, 0, 0, 9, 8);
        const px = ctx.getImageData(0, 0, 9, 8).data;
        let bits = '';
        for (let y = 0; y < 8; y++) for (let x = 0; x < 8; x++) {
          const i = (y * 9 + x) * 4, j = i + 4;
          const a = px[i] * .299 + px[i+1] * .587 + px[i+2] * .114;
          const b = px[j] * .299 + px[j+1] * .587 + px[j+2] * .114;
          bits += a > b ? '1' : '0';
        }
        URL.revokeObjectURL(img.src);
        resolve(bits);
      };
      img.onerror = () => resolve(null);
      img.src = URL.createObjectURL(file);
    });
  }
  function hamming(a, b) {
    let d = 0;
    for (let i = 0; i < a.length; i++) if (a[i] !== b[i]) d++;
    return d;
  }
  function cutVerdict(d) {
    if (d === null) return null;
    if (d <= 12) return { icon: '🔴', color: '#f87171', text: `构图过近(差异 ${d}/64) — 跳戏风险高,建议这两张之间换景别或转 30°+ 角度` };
    if (d <= 22) return { icon: '🟡', color: '#fbbf24', text: `偏相似(差异 ${d}/64) — 可接受,景别差再大些更稳` };
    return { icon: '🟢', color: '#4ade80', text: `差异充分(差异 ${d}/64) — 剪接应当自然` };
  }
  async function updateTransitions() {
    while (imgHashes.length < imgFiles.length) {
      imgHashes.push(await fileDHash(imgFiles[imgHashes.length]));
    }
    for (let i = 0; i + 1 < imgFiles.length; i++) {
      const el = document.getElementById(`cutHint${i}`);
      if (!el) continue;
      const a = imgHashes[i], b = imgHashes[i + 1];
      const v = (a && b) ? cutVerdict(hamming(a, b)) : null;
      if (v) {
        el.style.color = v.color;
        el.textContent = `${v.icon} ✂ ${i + 1}→${i + 2} 剪接预判:${v.text}`;
      }
    }
  }

  // 多机位时为每张图渲染一条分镜提示词输入（缩略图 + textarea），值存 imgPrompts。
  function renderPerPrompts() {
    const field = document.getElementById('perPromptField');
    const list = document.getElementById('perPromptList');
    if (imgFiles.length < 2) { field.style.display = 'none'; list.innerHTML = ''; return; }
    field.style.display = 'block';
    list.innerHTML = imgFiles.map((f, i) =>
      `<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:4px">
         <div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0">
           <button type="button" class="moveBtn" data-idx="${i}" data-dir="-1"${i === 0 ? ' disabled' : ''} title="上移" style="width:64px;padding:1px 0;font-size:12px;line-height:1.3;border:1px solid var(--border2);background:var(--surface2);color:var(--text);border-radius:6px;cursor:pointer">⬆</button>
           <div style="position:relative">
             <img style="width:64px;height:64px;object-fit:cover;border-radius:8px" src="${URL.createObjectURL(f)}">
             <span style="position:absolute;top:2px;left:2px;background:#000a;color:#fff;border-radius:4px;padding:0 5px;font-size:11px">${i + 1}</span>
           </div>
           <button type="button" class="moveBtn" data-idx="${i}" data-dir="1"${i + 1 === imgFiles.length ? ' disabled' : ''} title="下移" style="width:64px;padding:1px 0;font-size:12px;line-height:1.3;border:1px solid var(--border2);background:var(--surface2);color:var(--text);border-radius:6px;cursor:pointer">⬇</button>
         </div>
         <div style="flex:1;display:flex;flex-direction:column;gap:4px">
           <textarea data-idx="${i}" class="perPrompt" style="min-height:64px;font-size:12.5px"
             placeholder="机位 ${i + 1} 的镜头/情绪描述（留空用全局）">${imgPrompts[i] || ''}</textarea>
           <label style="font-size:12px;color:var(--muted);cursor:pointer;user-select:none">
             <input type="checkbox" class="staticChk" data-idx="${i}" ${imgStatic[i] ? 'checked' : ''}>
             🛰️ 画外音/空镜（此段不对口型，静态画面+缓慢漂移）
           </label>
           ${imgMotion[i] ? `<div style="font-size:11.5px;color:#a78bfa">🎥 军师运镜：${imgMotion[i]}</div>` : ''}
         </div>
       </div>` +
      (i + 1 < imgFiles.length
        ? `<div id="cutHint${i}" style="margin:0 0 8px 74px;font-size:11.5px;color:var(--muted)">✂ ${i + 1}→${i + 2} 剪接预判分析中…</div>`
        : '')).join('');
    list.querySelectorAll('.perPrompt').forEach(t =>
      t.addEventListener('input', () => { imgPrompts[+t.dataset.idx] = t.value; }));
    list.querySelectorAll('.staticChk').forEach(c =>
      c.addEventListener('change', () => { imgStatic[+c.dataset.idx] = c.checked; }));
    list.querySelectorAll('.moveBtn').forEach(b =>
      b.addEventListener('click', () => moveImg(+b.dataset.idx, +b.dataset.dir)));
    updateTransitions();
  }

  // ── 一键铺情绪曲线：按图数 N 自动填每段「景别/角度 + 情绪」 ──────────────
  // 景别轮换→相邻段不雷同(30度规则);情绪按 前奏→主歌收→递进→副歌放→桥段→结尾归静。
  // 不写「动作归零」后缀与首段前奏静默——后端 create_mtv 会自动追加,避免重复。
  function autoFillArc() {
    const n = imgFiles.length;
    if (n < 2) return;
    if (imgPrompts.some(p => p && p.trim()) &&
        !confirm('分镜框已有内容,确定用情绪曲线模板覆盖?')) return;
    const FRAMING = [
      'wide two-shot, both framed together facing forward',
      'medium shot from a side angle, one singer slightly foreground',
      'closer two-shot, leaning subtly toward each other with eye contact',
      'close-up with shallow depth of field',
      'two-shot at eye level, both singing together',
      'intimate close two-shot, faces near, warm connection',
      'side-angle shot near the instruments',
      'frontal medium close-up, soft gaze'
    ];
    const emo = (i) => {
      const p = n === 1 ? 0 : i / (n - 1);
      if (i === 0) return 'calm and gentle, easing in';
      if (i === n - 1) return 'warm, resolved and peaceful as the song closes';
      if (p < 0.30) return 'warm restrained verse emotion, tender';
      if (p < 0.50) return 'swelling pre-chorus feeling, building warmth';
      if (p < 0.78) return 'lifted joyful chorus energy, brighter and singing out';
      return 'heartfelt and reflective, softer intimate dynamics';
    };
    for (let i = 0; i < n; i++) imgPrompts[i] = `${FRAMING[i % FRAMING.length]}, ${emo(i)}`;
    renderPerPrompts();
  }
  document.getElementById('autoArcBtn').addEventListener('click', autoFillArc);

  // ── 🧠 军师参谋：本地 gemma4 看图 → 排序 + 逐图运镜建议（异步熬粥，约几分钟）──
  const LV = { green: ['🟢', '#4ade80'], yellow: ['🟡', '#fbbf24'], red: ['🔴', '#f87171'] };
  function applyOrder(perm) {   // perm: 1-indexed 数组，按它重排四个并行数组
    const idx = perm.map(x => x - 1).filter(i => i >= 0 && i < imgFiles.length);
    if (idx.length !== imgFiles.length) { alert('建议顺序与图片数不符，已忽略'); return; }
    imgFiles = idx.map(i => imgFiles[i]);
    imgPrompts = idx.map(i => imgPrompts[i]);
    imgStatic = idx.map(i => imgStatic[i]);
    imgMotion = idx.map(i => imgMotion[i]);
    imgHashes = [];
    renderImages(); renderPerPrompts(); refreshGo();
  }
  function renderAdvice(r) {
    const panel = document.getElementById('advisorPanel');
    const esc = s => (s || '').replace(/[<>&]/g, c => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;' }[c]));
    let h = '';
    if (r.overall) h += `<div style="margin-bottom:6px"><b>📽️ 整体观感</b>：${esc(r.overall)}</div>`;
    if (r.first) h += `<div>🎬 <b>开场</b>：${esc(r.first)}</div>`;
    if (r.last) h += `<div style="margin-bottom:6px">🏁 <b>收尾</b>：${esc(r.last)}</div>`;
    if (Array.isArray(r.transitions) && r.transitions.length) {
      h += `<div style="margin:6px 0 2px"><b>✂ 衔接预判</b></div>`;
      h += r.transitions.map(t => { const v = LV[t.level] || ['⚪', 'var(--muted)'];
        return `<div style="color:${v[1]}">${v[0]} ${t.from}→${t.to}：${esc(t.note)}</div>`; }).join('');
    }
    if (Array.isArray(r.motions) && r.motions.length) {
      h += `<div style="margin:6px 0 2px"><b>🎥 逐图运镜</b></div>`;
      h += r.motions.map(m => `<div style="color:#a78bfa">第${m.img}张 → <b>${esc(m.motion)}</b>　<span style="color:var(--muted)">${esc(m.reason)}</span></div>`).join('');
    }
    const so = r.suggested_order;
    if (so) {
      const nums = (typeof so === 'string' ? so : '').match(/\d+/g);
      h += `<div style="margin-top:8px;padding-top:8px;border-top:1px solid #a78bfa33">🔀 <b>建议顺序</b>：${esc(typeof so === 'string' ? so : JSON.stringify(so))}</div>`;
      if (nums && nums.length === imgFiles.length) {
        h += `<button id="applyOrderBtn" type="button" style="margin-top:6px;font-size:12px;padding:4px 12px;border-radius:6px;border:1px solid #a78bfa;background:#a78bfa22;color:#a78bfa;cursor:pointer">✅ 应用此顺序（图片重排）</button>`;
      }
    }
    panel.innerHTML = h || '军师没有返回有效建议（可重试）。';
    panel.style.display = 'block';
    // 先把运镜建议落进 imgMotion（按原始上传序），再渲染列表显示
    if (Array.isArray(r.motions)) r.motions.forEach(m => { if (m.img >= 1 && m.img <= imgMotion.length) imgMotion[m.img - 1] = m.motion; });
    renderPerPrompts();
    const ab = document.getElementById('applyOrderBtn');
    if (ab) ab.addEventListener('click', () => applyOrder((typeof so === 'string' ? so : '').match(/\d+/g).map(Number)));
  }
  let advisorLyrics = '';   // 记住已填歌词，重点军师不用重填
  // 第一步：点军师 → 先让填歌词（排序的"剧本"），不直接开跑
  document.getElementById('advisorBtn').addEventListener('click', () => {
    if (imgFiles.length < 2) { alert('先至少添加 2 张图'); return; }
    const panel = document.getElementById('advisorPanel');
    panel.style.display = 'block';
    panel.innerHTML =
      `<div style="margin-bottom:6px"><b>📝 贴上这首歌的歌词</b>（军师据歌词的叙事/情绪走向来排画面；标注词如 <code>[副歌]</code>/<code>(男)</code> 可保留，它会自行理解）</div>
       <textarea id="advisorLyrics" style="width:100%;min-height:110px;font-size:12.5px" placeholder="把整首歌词粘进来…&#10;（留空也能跑，但只能靠画面本身猜情绪，排序会粗糙）">${advisorLyrics.replace(/</g, '&lt;')}</textarea>
       <button id="advisorRunBtn" type="button" style="margin-top:6px;font-size:12.5px;padding:5px 14px;border-radius:6px;border:1px solid #a78bfa;background:#a78bfa22;color:#a78bfa;cursor:pointer">🍲 开始熬粥分析（约几分钟）</button>`;
    document.getElementById('advisorRunBtn').addEventListener('click', () => {
      advisorLyrics = document.getElementById('advisorLyrics').value.trim();
      runAdvisor(advisorLyrics);
    });
  });

  // 第二步:带歌词起异步分析 + 轮询熬粥进度
  async function runAdvisor(lyrics) {
    const btn = document.getElementById('advisorBtn');
    const panel = document.getElementById('advisorPanel');
    btn.disabled = true;
    panel.innerHTML = '🧠 军师启动中…（本地 gemma4 熬粥，逐图降温到 55°C 再喂，约几分钟，别关页面）';
    try {
      const form = new FormData();
      imgFiles.forEach(f => form.append('images', f));
      // 歌词作为排序"剧本"；没填则退回用视觉全局提示词
      form.append('hint', lyrics || document.getElementById('prompt').value || '');
      const r0 = await fetch('/api/advisor/start', { method: 'POST', body: form });
      const d0 = await r0.json();
      if (d0.error) throw new Error(d0.error);
      const tid = d0.tid;
      const t0 = Date.now();
      const poll = setInterval(async () => {
        try {
          const r = await fetch('/api/advisor/status/' + tid);
          const d = await r.json();
          const sec = Math.round((Date.now() - t0) / 1000);
          if (!d.state) {        // 真没 state=任务丢了(404/服务重启)→ 提示重跑;state=error 留给下面显示真错误
            clearInterval(poll); btn.disabled = false;
            panel.innerHTML = '⚠️ 军师任务丢失（服务可能重启了）。请重新点「🧠 军师参谋」再跑一次（歌词已记住）。';
            return;
          }
          if (d.state === 'running') {
            panel.innerHTML = `🧠 ${d.msg || '军师工作中'}　<span style="color:var(--muted)">（已 ${sec}s）</span>`;
          } else if (d.state === 'done') {
            clearInterval(poll); btn.disabled = false;
            renderAdvice((d.result && d.result.result) || {});
          } else if (d.state === 'error') {
            clearInterval(poll); btn.disabled = false;
            panel.innerHTML = `❌ 军师失败：${d.error || '未知错误'}<br><span style="color:var(--muted)">检查本机 Ollama(gemma4) 是否在跑。</span>`;
          }
        } catch (e) { /* 轮询抖动，下次再试 */ }
      }, 2500);
    } catch (e) {
      btn.disabled = false;
      panel.innerHTML = '❌ 启动失败：' + e.message;
    }
  }

  // ── 🎬 结构分镜排期:按音乐结构切镜头槽 + 军师排期 → 分镜表 → 提交云机 ──
  let planResult = null, planStatic = [];
  document.getElementById('planBtn').addEventListener('click', () => {
    if (imgFiles.length < 2) { alert('先至少加 2 张图'); return; }
    if (!audFile) { alert('结构排期需要歌曲音频,请先上传音频'); return; }
    const panel = document.getElementById('planPanel');
    panel.style.display = 'block';
    panel.innerHTML =
      `<div style="margin-bottom:6px"><b>🎬 结构分镜排期</b>（按音乐结构切镜:前奏/副歌/华彩各自起镜,军师排哪张图配哪段+运镜）</div>
       <div style="margin-bottom:4px">Suno song_id（结构切镜要靠它的逐词对齐;在 suno.com 歌曲链接里那串 id）：</div>
       <input id="planSongId" style="width:100%;font-size:12.5px;padding:4px" placeholder="例如 c3df932b-d63d-4d57-912b-a262c8c1c9b2">
       <textarea id="planLyrics" style="width:100%;min-height:90px;font-size:12.5px;margin-top:6px" placeholder="歌词（可留空;有则军师排得更准）">${(advisorLyrics || '').replace(/</g, '&lt;')}</textarea>
       <button id="planRunBtn" type="button" style="margin-top:6px;font-size:12.5px;padding:5px 14px;border-radius:6px;border:1px solid #34d399;background:#34d39922;color:#34d399;cursor:pointer">🍲 开始排期（约几分钟）</button>`;
    document.getElementById('planRunBtn').addEventListener('click', () => {
      const sid = document.getElementById('planSongId').value.trim();
      advisorLyrics = document.getElementById('planLyrics').value.trim();
      if (!sid) { alert('请填 Suno song_id'); return; }
      runPlan(sid, advisorLyrics);
    });
  });

  async function runPlan(songId, lyrics) {
    const btn = document.getElementById('planBtn'), panel = document.getElementById('planPanel');
    btn.disabled = true;
    panel.innerHTML = '🎬 结构排期启动中…（切镜头槽 → 逐图理解 → CPU 排期,约几分钟,别关页面）';
    try {
      const form = new FormData();
      imgFiles.forEach(f => form.append('images', f));
      form.append('audio', audFile);
      form.append('song_id', songId);
      form.append('lyrics', lyrics || '');
      const r0 = await fetch('/api/plan/start', { method: 'POST', body: form });
      const d0 = await r0.json();
      if (d0.error) throw new Error(d0.error);
      const tid = d0.tid, t0 = Date.now();
      const poll = setInterval(async () => {
        try {
          const d = await (await fetch('/api/plan/status/' + tid)).json();
          const sec = Math.round((Date.now() - t0) / 1000);
          if (!d.state) { clearInterval(poll); btn.disabled = false; panel.innerHTML = '⚠️ 排期任务丢失,请重点「🎬 结构分镜排期」。'; return; }
          if (d.state === 'running') { panel.innerHTML = `🎬 ${d.msg || '排期中'}　<span style="color:var(--muted)">（已 ${sec}s）</span>`; }
          else if (d.state === 'done') { clearInterval(poll); btn.disabled = false; renderPlan(d.result); }
          else if (d.state === 'error') { clearInterval(poll); btn.disabled = false; panel.innerHTML = `❌ 排期失败：${d.error}<br><span style="color:var(--muted)">多为 gemma 偶发坏输出,直接重跑一次多半就好;或检查 suno-api(:3000)/song_id。</span>`; }
        } catch (e) {}
      }, 2500);
    } catch (e) { btn.disabled = false; panel.innerHTML = '❌ 启动失败：' + e.message; }
  }

  let planImg = [], planMotion = [];
  const MOTIONS = ['推近', '拉远', '左右移', '上下移', '放大横移'];
  function renderPlan(r) {
    planResult = r;
    const panel = document.getElementById('planPanel');
    const esc = s => (s || '').replace(/[<>&]/g, c => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;' }[c]));
    const byslot = {}; (r.plan || []).forEach(p => byslot[p.slot] = p);
    const empty = new Set((r.coverage && r.coverage.empty_images) || []);
    const slots = r.slots || [];
    // 每槽可编辑状态:图/运镜/空镜
    planImg = slots.map(s => (byslot[s.i] || {}).img || 1);
    planMotion = slots.map(s => (byslot[s.i] || {}).motion || '推近');
    planStatic = slots.map(s => { const p = byslot[s.i] || {}; return p.static !== undefined ? !!p.static : (s.role === '空镜' || empty.has(p.img)); });
    // 收起旧的逐图列表 + 藏掉旧的"生成多机位"大按钮(防误点;结构流程只走下面的 🚀)
    document.getElementById('perPromptList').style.display = 'none';
    document.getElementById('advisorPanel').style.display = 'none';
    const _gb = document.getElementById('goBtn'); if (_gb) _gb.style.display = 'none';
    const _gn = document.getElementById('goNote'); if (_gn) _gn.style.display = 'none';

    const imgOpts = i => imgFiles.map((f, k) => `<option value="${k + 1}" ${planImg[i] === k + 1 ? 'selected' : ''}>图${k + 1}</option>`).join('');
    const moOpts = i => MOTIONS.map(m => `<option ${planMotion[i] === m ? 'selected' : ''}>${m}</option>`).join('');
    let h = `<div style="margin-bottom:8px"><b>🎬 分镜表 · 可编辑</b>（${slots.length} 镜,切点已贴音乐结构）—— 换图调顺序 / 选运镜 / 勾🛰️空镜(=静帧,不勾=云机对口型)</div>`;
    h += `<div style="display:grid;grid-template-columns:34px 30px 1fr 84px 78px 52px;gap:6px;align-items:center;font-size:11px;color:var(--muted);padding:0 2px 4px">
      <div></div><div>镜</div><div>段落·时长</div><div>画面</div><div>运镜</div><div>空镜</div></div>`;
    h += slots.map(s => {
      const f = imgFiles[planImg[s.i] - 1];
      const thumb = f ? `<img class="planThumb" data-i="${s.i}" src="${URL.createObjectURL(f)}" style="width:34px;height:34px;object-fit:cover;border-radius:4px">` : '';
      return `<div style="display:grid;grid-template-columns:34px 30px 1fr 84px 78px 52px;gap:6px;align-items:center;padding:2px;border-top:1px solid #34d39922">
        ${thumb}
        <div style="font-size:11px;color:var(--muted)">${s.i}</div>
        <div style="font-size:11.5px">[${esc(s.section)}]<br><span style="color:var(--muted)">${s.dur}s</span></div>
        <select class="planImg" data-i="${s.i}" style="font-size:11.5px;padding:2px">${imgOpts(s.i)}</select>
        <select class="planMo" data-i="${s.i}" style="font-size:11.5px;padding:2px">${moOpts(s.i)}</select>
        <input type="checkbox" class="planStatic" data-i="${s.i}" ${planStatic[s.i] ? 'checked' : ''} style="justify-self:center;transform:scale(1.2)">
      </div>`;
    }).join('');
    if (r.coverage && r.coverage.tips) h += `<div style="margin-top:8px;padding-top:6px;border-top:1px solid #34d39933;font-size:12px">📋 <b>覆盖度体检</b>：${r.coverage.tips.map(esc).join('；')}</div>`;
    h += `<div style="margin-top:10px"><button id="planSubmitBtn" type="button" style="font-size:13px;padding:7px 18px;border-radius:7px;border:1px solid #34d399;background:#34d39933;color:#34d399;cursor:pointer">🚀 提交云机渲染</button>
      <span id="planCount" style="color:var(--muted);font-size:11.5px;margin-left:8px"></span></div>`;
    panel.innerHTML = h;
    const updCount = () => { document.getElementById('planCount').textContent =
      `${slots.length} 镜:${planStatic.filter(x => !x).length} 口型 + ${planStatic.filter(x => x).length} 空镜 · 记得开 AutoDL worker`; };
    panel.querySelectorAll('.planStatic').forEach(c => c.addEventListener('change', () => { planStatic[+c.dataset.i] = c.checked; updCount(); }));
    panel.querySelectorAll('.planMo').forEach(sel => sel.addEventListener('change', () => { planMotion[+sel.dataset.i] = sel.value; }));
    panel.querySelectorAll('.planImg').forEach(sel => sel.addEventListener('change', () => {
      const i = +sel.dataset.i; planImg[i] = +sel.value;
      const th = panel.querySelector(`.planThumb[data-i="${i}"]`);
      if (th && imgFiles[planImg[i] - 1]) th.src = URL.createObjectURL(imgFiles[planImg[i] - 1]);
    }));
    document.getElementById('planSubmitBtn').addEventListener('click', submitPlanned);
    updCount();
  }

  async function submitPlanned() {
    const btn = document.getElementById('planSubmitBtn');
    const err = m => { const c = document.getElementById('planCount'); if (c) c.innerHTML = `<span style="color:#f87171">❌ ${m}</span>`; if (btn) { btn.disabled = false; btn.textContent = '🚀 提交云机渲染'; } };
    try {
      if (!planResult || !(planResult.slots || []).length) { err('分镜表为空,请先跑结构排期'); return; }
      if (!audFile) { err('缺音频,请先上传歌曲'); return; }
      btn.disabled = true; btn.textContent = '上传提交中…';
      const slots = planResult.slots;
      const cuts = [slots[0].start].concat(slots.map(s => s.end));   // n+1 个切点
      const form = new FormData();
      form.append('audio', audFile);
      form.append('prompt', document.getElementById('prompt').value);
      form.append('cuts', JSON.stringify(cuts));
      slots.forEach(s => {
        const f = imgFiles[planImg[s.i] - 1];
        form.append('images', f);
        form.append('static', planStatic[s.i] ? '1' : '0');
        form.append('motion', planMotion[s.i] || '');
        form.append('prompts', '');
      });
      const d = await (await fetch('/api/create_mtv', { method: 'POST', body: form })).json();
      if (d.error) { err('提交失败:' + d.error); return; }
      curJob = d.job_id; localStorage.setItem('curJob', curJob);
      document.getElementById('inputArea').style.display = 'none';
      document.getElementById('progressCard').style.display = 'block';
      listen(d.job_id);
    } catch (e) { err('提交异常:' + e.message); }
  }

  (function () {
    const drop = document.getElementById('dropImage'), inp = document.getElementById('fileImage');
    drop.addEventListener('click', () => inp.click());
    inp.addEventListener('change', () => addImages(inp.files));
    ['dragover', 'dragenter'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('dragging'); }));
    ['dragleave', 'drop'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('dragging'); }));
    drop.addEventListener('drop', e => addImages(e.dataTransfer.files));
  })();
  bindDrop(document.getElementById('dropAudio'), document.getElementById('fileAudio'), 'audio', f => {
    audFile = f;
    const url = URL.createObjectURL(f);
    document.getElementById('audBody').innerHTML =
      `<div class="drop-title">🎵 ${f.name}</div><audio controls src="${url}"></audio>`;
    document.getElementById('dropAudio').classList.add('filled');
    refreshGo();
  });

  function refreshGo() {
    const btn = document.getElementById('goBtn');
    btn.disabled = !(imgFiles.length && audFile);
    btn.textContent = imgFiles.length > 1
      ? `🎬 生成多机位 MTV（${imgFiles.length} 段）` : '🎬 开始生成对口型视频';
  }

  document.getElementById('goBtn').addEventListener('click', async () => {
    if (!imgFiles.length || !audFile) return;
    const btn = document.getElementById('goBtn');
    btn.disabled = true; btn.textContent = '上传中…';
    const form = new FormData();
    form.append('audio', audFile);
    form.append('prompt', document.getElementById('prompt').value);
    let url;
    if (imgFiles.length > 1) {            // 多机位
      imgFiles.forEach((f, i) => { form.append('images', f); form.append('prompts', imgPrompts[i] || ''); form.append('static', imgStatic[i] ? '1' : '0'); form.append('motion', imgMotion[i] || ''); });
      url = '/api/create_mtv';
    } else {                              // 单段
      form.append('image', imgFiles[0]);
      url = '/api/create';
    }
    try {
      const r = await fetch(url, { method: 'POST', body: form });
      const d = await r.json();
      if (d.error) throw new Error(d.error);
      curJob = d.job_id;
      localStorage.setItem('curJob', curJob);
      document.getElementById('inputArea').style.display = 'none';
      document.getElementById('progressCard').style.display = 'block';
      listen(d.job_id);
    } catch (e) {
      alert('提交失败：' + e.message);
      btn.disabled = false; refreshGo();
    }
  });

  let watching = false;
  function listen(jobId) {
    if (evt) evt.close();
    watching = true;
    evt = new EventSource(`/api/status/${jobId}`);
    evt.onmessage = e => {
      const d = JSON.parse(e.data);
      apply(d);
      if (['completed', 'error'].includes(d.status)) {
        watching = false; evt.close(); localStorage.removeItem('curJob');
      }
    };
    // 断线(服务重启/网络抖动)不再直接放弃,3 秒后自动重连续上显示
    evt.onerror = () => {
      evt.close();
      if (watching) setTimeout(() => { if (watching) listen(jobId); }, 3000);
    };
  }

  function setStep(id, state) {
    const el = document.getElementById(id);
    el.classList.remove('active', 'done');
    if (state) el.classList.add(state);
  }

  function apply(d) {
    if (d.error && d.status === 'error') { /* fallthrough to error msg */ }
    document.getElementById('barFill').style.width = (d.progress || 0) + '%';
    const msg = document.getElementById('progressMsg');
    msg.textContent = d.message || '';
    msg.className = 'progress-msg' + (d.status === 'error' ? ' error' : '');

    const vb = document.getElementById('vadBox');
    if (d.vad && d.vad.length) {
      vb.style.display = 'block';
      vb.innerHTML = '<div class="vt">🎚 人声活动检测（已自动为这些段注入提示词）</div>' +
        d.vad.map(x => `<div>${x}</div>`).join('');
    }

    const s = d.status;
    setStep('s-up', 'done');
    if (s === 'queued') { setStep('s-queue', 'active'); }
    else if (['claimed', 'generating', 'uploading', 'mtv_running', 'stitching'].includes(s)) {
      setStep('s-queue', 'done'); setStep('s-gen', 'active');
    } else if (s === 'completed') {
      setStep('s-queue', 'done'); setStep('s-gen', 'done'); setStep('s-done', 'done');
      showResult();
    } else if (s === 'error') {
      setStep('s-gen', 'active');
    }

    if (d.logs && d.logs.length) renderLogs(d.logs);
  }

  function renderLogs(logs) {
    const box = document.getElementById('logEntries');
    box.innerHTML = logs.map(l =>
      `<div class="log-entry log-${l.type || 'info'}"><span class="log-time">${l.time}</span><span class="log-msg">${l.msg}</span></div>`
    ).join('');
    box.scrollTop = box.scrollHeight;
  }

  function showResult() {
    const card = document.getElementById('resultCard');
    document.getElementById('resultVideo').src = `/api/result/${curJob}`;
    document.getElementById('dlBtn').href = `/api/result/${curJob}?download=1`;
    card.style.display = 'block';
    card.scrollIntoView({ behavior: 'smooth' });
  }

  document.getElementById('newBtn').addEventListener('click', () => { localStorage.removeItem('curJob'); location.reload(); });

  // ── 云机在线/失联轮询：用户最常踩的坑=忘开 worker，活在队列干等。每 5s 刷新状态条 ──
  async function pollFleet() {
    try {
      const d = await (await fetch('/api/fleet')).json();
      const el = document.getElementById('fleetBar');
      const extra = (d.queued || d.running) ? ` · 队列 ${d.queued} 排队/${d.running} 生成中` : '';
      if (d.online > 0) {
        el.className = 'fleet on';
        el.textContent = `☁ 云机在线 ${d.online} 台 · 最近 ${d.last_seen_ago ?? 0}s 前轮询${extra}`;
      } else {
        el.className = 'fleet off';
        const seen = d.last_seen_ago == null ? '从未连接' : `最近 ${d.last_seen_ago}s 前`;
        el.textContent = `☁ 云机未连接（${seen}）— 请开启 AutoDL 并启动 worker${extra}`;
      }
    } catch (e) { /* 服务重启瞬间，静默跳过 */ }
  }
  setInterval(pollFleet, 5000); pollFleet();

  // 刷新或重开页面后,自动恢复正在追踪的任务(已完成则直接显示结果视频)——根治"前端卡住"
  (function restoreJob() {
    const j = localStorage.getItem('curJob');
    if (!j) return;
    curJob = j;
    document.getElementById('inputArea').style.display = 'none';
    document.getElementById('progressCard').style.display = 'block';
    listen(j);
  })();
</script>
</body>
</html>
